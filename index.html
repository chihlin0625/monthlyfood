<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>預算管家 V6.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .calendar-grid div { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { 50: '#F5F3FF', 100: '#EDE9FE', 500: '#A855F7', 600: '#9333EA', 700: '#7E22CE' } } }
            }
        }
    </script>
</head>
<body class="bg-brand-50/50 min-h-screen flex flex-col items-center py-6 px-4 pb-20">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden relative border border-brand-100">
        
        <button onclick="toggleSettings()" class="absolute top-6 right-6 text-purple-200 hover:text-white transition-colors z-20">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>

        <div id="settingsPanel" class="hidden bg-brand-50 border-b border-brand-100 p-8">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-brand-600 mb-2">週預算額度</label>
                    <input id="weekBudgetInput" type="number" class="w-full p-4 bg-white border-2 border-brand-100 rounded-2xl font-bold text-brand-700 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-brand-600 mb-2">月預算額度 (5日結算)</label>
                    <input id="monthBudgetInput" type="number" class="w-full p-4 bg-white border-2 border-brand-100 rounded-2xl font-bold text-brand-700 outline-none">
                </div>
                <button onclick="saveSettings()" class="w-full py-4 bg-brand-600 text-white rounded-2xl font-black shadow-lg active:scale-95 transition-all">更新設定</button>
            </div>
        </div>
        
        <div class="bg-gradient-to-br from-brand-700 via-brand-600 to-purple-500 text-white p-10 text-center relative">
            <p class="text-brand-100 text-[11px] tracking-widest uppercase mb-2 font-bold opacity-80">Weekly Remaining</p>
            <h1 class="text-6xl font-black tracking-tighter">$ <span id="weekBalance">0</span></h1>
            <div class="flex justify-between mt-8 pt-6 border-t border-white/20">
                <div class="text-left">
                    <p class="opacity-70 text-[9px] font-bold uppercase">已花費</p>
                    <p class="font-black text-xl">$ <span id="weekSum">0</span></p>
                </div>
                <div class="text-right">
                    <p class="opacity-70 text-[9px] font-bold uppercase">總額度</p>
                    <p class="font-black text-xl">$ <span id="weekTotalLabel">0</span></p>
                </div>
            </div>
        </div>

        <div class="bg-white px-8 py-6">
            <div class="flex justify-between items-center mb-3">
                <span id="monthTitle" class="text-[10px] font-black text-gray-400 tracking-tight">--/-- CYCLE</span>
                <span class="text-sm font-black text-brand-600">剩餘 $<span id="monthBalance">0</span></span>
            </div>
            <div class="w-full bg-brand-50 rounded-full h-4 shadow-inner p-1 border border-brand-100">
                <div id="monthProgress" class="bg-brand-500 h-2 rounded-full transition-all duration-1000 shadow-sm" style="width: 0%"></div>
            </div>
        </div>

        <div class="bg-gray-50/50 px-8 py-6 border-y border-gray-100 text-gray-600">
            <div class="flex justify-between items-center mb-4 px-2">
                <button onclick="changeMonth(-1)" class="text-brand-500 font-black text-lg p-1">&lt;</button>
                <h3 id="calendarTitle" class="text-xs font-black tracking-[0.2em] text-gray-500 uppercase">2026 APRIL</h3>
                <button onclick="changeMonth(1)" class="text-brand-500 font-black text-lg p-1">&gt;</button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-[9px] font-black text-gray-300 uppercase mb-2">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 calendar-grid"></div>
        </div>

        <div class="p-8 space-y-5 bg-white">
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 ml-1">金額</label>
                    <input id="amountInput" type="number" placeholder="0" inputmode="decimal" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl text-2xl font-black focus:border-brand-500 outline-none transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 ml-1">時間</label>
                    <input id="timeInput" type="datetime-local" class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl text-[10px] outline-none">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-black text-gray-400 ml-1">項目備註</label>
                <input id="descInput" type="text" placeholder="買潤餅材料..." class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-brand-500 outline-none">
            </div>
            <button onclick="handleAction()" class="w-full py-5 bg-brand-600 text-white font-black rounded-2xl text-lg shadow-xl active:scale-95 transition-all">新增紀錄</button>
        </div>

        <div class="px-8 pb-10 space-y-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[10px] font-black text-gray-300 uppercase">最近 10 筆明細</h3>
                <button onclick="manualReset()" class="text-[9px] text-gray-200 underline">重置資料庫</button>
            </div>
            <div id="expenseList" class="space-y-3"></div>
        </div>
    </div>

<script>
    // 1. 強效自癒初始化
    const STORAGE_KEY = 'food_budget_v6_final';
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { expenses: [], weekTotal: 2100, monthTotal: 9000 };
    
    // 確保關鍵數值不為 undefined 或 NaN
    if (!data.expenses) data.expenses = [];
    if (!data.weekTotal || isNaN(data.weekTotal)) data.weekTotal = 2100;
    if (!data.monthTotal || isNaN(data.monthTotal)) data.monthTotal = 9000;

    let currentCalDate = new Date();

    function getMonthRange() {
        const now = new Date();
        let start = new Date(now.getFullYear(), now.getMonth(), 5, 0, 0, 0);
        if (now.getDate() < 5) start.setMonth(start.getMonth() - 1);
        let end = new Date(start.getFullYear(), start.getMonth() + 1, 4, 23, 59, 59);
        return { start: start.getTime(), end: end.getTime() };
    }

    function getWeekRange() {
        const now = new Date();
        const day = now.getDay();
        const diff = now.getDate() - day + (day == 0 ? -6 : 1); 
        const start = new Date(now.setDate(diff)).setHours(0,0,0,0);
        const end = start + (7 * 24 * 60 * 60 * 1000) - 1;
        return { start, end };
    }

    function handleAction() {
        const amount = parseFloat(document.getElementById('amountInput').value);
        const note = document.getElementById('descInput').value.trim() || "未命名";
        const time = new Date(document.getElementById('timeInput').value).getTime() || Date.now();

        if (isNaN(amount) || amount <= 0) return;

        data.expenses.unshift({ id: Date.now(), amount, note, timestamp: time });
        data.expenses.sort((a, b) => b.timestamp - a.timestamp);
        
        document.getElementById('amountInput').value = '';
        document.getElementById('descInput').value = '';
        resetTimeInput();
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        render();
    }

    function renderCalendar() {
        const year = currentCalDate.getFullYear();
        const month = currentCalDate.getMonth();
        const today = new Date();
        const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
        
        document.getElementById('calendarTitle').innerText = `${year} ${monthNames[month]}`;
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
            const isCycleStart = day === 5;
            let cls = "text-gray-600";
            if (isToday) cls = "bg-brand-600 text-white rounded-2xl shadow-md scale-75";
            else if (isCycleStart) cls = "text-brand-600 bg-brand-100 rounded-2xl";
            grid.innerHTML += `<div class="${cls}">${day}</div>`;
        }
    }

    function changeMonth(step) {
        currentCalDate.setMonth(currentCalDate.getMonth() + step);
        renderCalendar();
    }

    function render() {
        const week = getWeekRange();
        const month = getMonthRange();
        
        // 確保數值計算安全
        const weekSum = data.expenses.filter(i => i.timestamp >= week.start && i.timestamp <= week.end).reduce((s, i) => s + i.amount, 0);
        const monthSum = data.expenses.filter(i => i.timestamp >= month.start && i.timestamp <= month.end).reduce((s, i) => s + i.amount, 0);

        const weekBal = (data.weekTotal || 2100) - weekSum;
        const monthBal = (data.monthTotal || 9000) - monthSum;

        document.getElementById('weekSum').innerText = Math.round(weekSum);
        document.getElementById('weekBalance').innerText = Math.round(weekBal);
        document.getElementById('weekTotalLabel').innerText = data.weekTotal;

        const mStart = new Date(month.start);
        const mEnd = new Date(month.end);
        document.getElementById('monthTitle').innerText = `${mStart.getMonth()+1}/${mStart.getDate()} - ${mEnd.getMonth()+1}/${mEnd.getDate()} CYCLE`;
        document.getElementById('monthSum').innerText = Math.round(monthSum);
        document.getElementById('monthBalance').innerText = Math.round(monthBal);

        const progress = Math.min((monthSum / (data.monthTotal || 9000)) * 100, 100);
        document.getElementById('monthProgress').style.width = progress + '%';

        const list = document.getElementById('expenseList');
        const items = data.expenses.slice(0, 10);
        list.innerHTML = items.length === 0 
            ? `<p class="text-center text-gray-300 text-[10px] py-10">尚無紀錄</p>`
            : items.map((item, idx) => `
                <div class="bg-gray-50/80 p-4 rounded-2xl flex justify-between items-center border border-white shadow-sm">
                    <div>
                        <p class="font-black text-gray-800 text-base">$${item.amount}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">${item.note}</p>
                    </div>
                    <div class="flex items-center space-x-3">
                        <span class="text-[9px] font-black text-gray-300">${new Date(item.timestamp).getMonth()+1}/${new Date(item.timestamp).getDate()}</span>
                        <button onclick="deleteItem(${idx})" class="text-red-200 hover:text-red-500 text-xl">&times;</button>
                    </div>
                </div>
            `).join('');
        renderCalendar();
    }

    function toggleSettings() {
        document.getElementById('settingsPanel').classList.toggle('hidden');
        document.getElementById('weekBudgetInput').value = data.weekTotal;
        document.getElementById('monthBudgetInput').value = data.monthTotal;
    }

    function saveSettings() {
        const w = parseFloat(document.getElementById('weekBudgetInput').value);
        const m = parseFloat(document.getElementById('monthBudgetInput').value);
        if (!isNaN(w)) data.weekTotal = w;
        if (!isNaN(m)) data.monthTotal = m;
        saveAndRender();
        toggleSettings();
    }

    function resetTimeInput() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('timeInput').value = now.toISOString().slice(0, 16);
    }

    function deleteItem(idx) { if(confirm("確定刪除？")) { data.expenses.splice(idx, 1); saveAndRender(); } }
    function manualReset() { if(confirm("確定要重置所有數據？")) { data.expenses = []; saveAndRender(); } }

    resetTimeInput();
    render();
</script>
</body>
</html>
