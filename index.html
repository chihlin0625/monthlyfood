<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>預算管家 V6.2 (Calendar Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .calendar-dot { width: 4px; height: 4px; border-radius: 50%; background-color: #8B5CF6; margin-top: 2px; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { 500: '#8B5CF6', 600: '#7C3AED', 100: '#EDE9FE' } }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center py-6 px-4 pb-24">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden relative border border-gray-100">
        
        <button onclick="toggleSettings()" class="absolute top-5 right-5 text-purple-200 hover:text-white transition-colors z-20">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>

        <div id="settingsPanel" class="hidden bg-brand-100 border-b border-purple-200 p-6 shadow-inner">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-purple-600 uppercase mb-1">本週預算 (週一重置)</label>
                    <input id="weekBudgetInput" type="number" class="w-full p-3 border-2 border-white rounded-xl font-bold text-purple-700 shadow-sm focus:outline-none focus:border-brand-500">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-purple-600 uppercase mb-1">月預算 (5日結算)</label>
                    <input id="monthBudgetInput" type="number" class="w-full p-3 border-2 border-white rounded-xl font-bold text-purple-700 shadow-sm focus:outline-none focus:border-brand-500">
                </div>
                <button onclick="saveSettings()" class="w-full py-3 bg-brand-600 text-white rounded-xl font-bold shadow-lg">儲存更新</button>
            </div>
        </div>
        
        <div id="statusCard" class="bg-gradient-to-br from-purple-600 via-purple-500 to-indigo-600 text-white p-10 text-center relative overflow-hidden">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
            <p class="text-purple-100 text-[10px] tracking-widest uppercase mb-1 font-medium opacity-80 italic">Weekly Remaining</p>
            <h1 class="text-6xl font-black tracking-tight mb-4">$ <span id="weekBalance">0</span></h1>
            <div class="flex justify-between items-center bg-black/10 rounded-2xl p-4 text-xs backdrop-blur-sm">
                <div class="text-left">
                    <p class="opacity-60 text-[9px] font-bold">已花費</p>
                    <p class="font-bold text-lg">$ <span id="weekSum">0</span></p>
                </div>
                <div class="w-[1px] h-8 bg-white/20"></div>
                <div class="text-right">
                    <p class="opacity-60 text-[9px] font-bold">總額度</p>
                    <p class="font-bold text-lg">$ <span id="weekTotalLabel">2100</span></p>
                </div>
            </div>
        </div>

        <div class="bg-white px-6 py-4 border-b border-gray-100">
            <div class="flex justify-between items-center mb-2">
                <span id="monthTitle" class="text-xs font-black text-gray-400">---</span>
                <span class="text-xs font-bold text-brand-600">剩餘 $<span id="monthBalance">0</span></span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-3">
                <div id="monthProgress" class="bg-brand-500 h-3 rounded-full transition-all duration-700 shadow-inner" style="width: 0%"></div>
            </div>
        </div>

        <div class="p-6 bg-gray-50/50">
            <div class="flex justify-between items-center mb-4 px-2">
                <button onclick="changeMonth(-1)" class="text-brand-500 hover:bg-brand-100 w-8 h-8 rounded-full transition-all">&lt;</button>
                <h3 id="calendarTitle" class="text-xs font-black text-gray-600 tracking-widest">2026 MARCH</h3>
                <button onclick="changeMonth(1)" class="text-brand-500 hover:bg-brand-100 w-8 h-8 rounded-full transition-all">&gt;</button>
            </div>
            <div class="grid grid-cols-7 gap-1 text-center text-[9px] font-black text-gray-300 uppercase mb-2">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center"></div>
        </div>

        <div class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input id="amountInput" type="number" placeholder="金額" inputmode="decimal" class="p-3 bg-gray-50 border-2 border-gray-100 rounded-2xl text-xl font-bold focus:border-brand-500 focus:outline-none">
                <input id="timeInput" type="datetime-local" class="p-3 bg-gray-50 border-2 border-gray-100 rounded-2xl text-[10px] focus:outline-none">
            </div>
            <input id="descInput" type="text" placeholder="備註 (例如：鹽酥雞)" class="w-full p-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-brand-500 focus:outline-none">
            <button id="actionBtn" onclick="handleAction()" class="w-full py-4 bg-brand-600 text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all">新增紀錄</button>
        </div>

        <div class="px-6 pb-6 space-y-2">
            <h3 class="text-[10px] font-black text-gray-300 uppercase tracking-widest">最近 10 筆明細</h3>
            <div id="expenseList" class="space-y-2"></div>
        </div>

        <div class="p-4 text-center border-t border-gray-50 bg-gray-50/30">
            <button onclick="manualReset()" class="text-[9px] text-gray-300 underline font-medium">重置所有資料庫數據</button>
        </div>
    </div>

<script>
    let data = JSON.parse(localStorage.getItem('food_budget_v6_2')) || { 
        expenses: [],
        weekTotal: 2100,
        monthTotal: 9000
    };
    let editIndex = -1;
    let currentCalDate = new Date();

    function toggleSettings() {
        document.getElementById('settingsPanel').classList.toggle('hidden');
        document.getElementById('weekBudgetInput').value = data.weekTotal;
        document.getElementById('monthBudgetInput').value = data.monthTotal;
    }

    function saveSettings() {
        data.weekTotal = parseFloat(document.getElementById('weekBudgetInput').value) || 2100;
        data.monthTotal = parseFloat(document.getElementById('monthBudgetInput').value) || 9000;
        saveAndRender();
        toggleSettings();
    }

    function getMonthRange() {
        const now = new Date();
        let start = new Date(now.getFullYear(), now.getMonth(), 5, 0, 0, 0);
        if (now.getDate() < 5) start.setMonth(start.getMonth() - 1);
        let end = new Date(start.getFullYear(), start.getMonth() + 1, 4, 23, 59, 59);
        return { start: start.getTime(), end: end.getTime() };
    }

    function getWeekRange() {
        const now = new Date();
        const day = now.getDay();
        const diff = now.getDate() - day + (day == 0 ? -6 : 1); 
        const start = new Date(now.setDate(diff)).setHours(0,0,0,0);
        const end = start + (7 * 24 * 60 * 60 * 1000) - 1;
        return { start, end };
    }

    function handleAction() {
        const amount = parseFloat(document.getElementById('amountInput').value);
        const note = document.getElementById('descInput').value.trim() || "未命名";
        const time = new Date(document.getElementById('timeInput').value).getTime();
        if (isNaN(amount) || amount <= 0) return;

        if (editIndex === -1) {
            data.expenses.push({ id: Date.now(), amount, note, timestamp: time });
        } else {
            const originalId = data.expenses[editIndex].id;
            data.expenses[editIndex] = { id: originalId, amount, note, timestamp: time };
            cancelEdit();
        }
        
        data.expenses.sort((a, b) => b.timestamp - a.timestamp);
        document.getElementById('amountInput').value = '';
        document.getElementById('descInput').value = '';
        resetTimeInput();
        saveAndRender();
    }

    function resetTimeInput() {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('timeInput').value = now.toISOString().slice(0, 16);
    }

    function saveAndRender() {
        localStorage.setItem('food_budget_v6_2', JSON.stringify(data));
        render();
    }

    function renderCalendar() {
        const year = currentCalDate.getFullYear();
        const month = currentCalDate.getMonth();
        const today = new Date();
        const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        document.getElementById('calendarTitle').innerText = `${year} ${monthNames[month]}`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
            const isCycleStart = day === 5;
            let cls = "text-gray-400";
            if (isToday) cls = "bg-brand-500 text-white rounded-xl font-bold shadow-md";
            else if (isCycleStart) cls = "text-brand-600 font-black ring-1 ring-brand-100 rounded-xl";
            
            grid.innerHTML += `<div class="h-8 flex flex-col items-center justify-center text-[10px] ${cls}">${day}${isCycleStart ? '<div class="calendar-dot"></div>' : ''}</div>`;
        }
    }

    function changeMonth(step) {
        currentCalDate.setMonth(currentCalDate.getMonth() + step);
        renderCalendar();
    }

    function render() {
        const week = getWeekRange();
        const month = getMonthRange();
        const weekSum = data.expenses.filter(i => i.timestamp >= week.start && i.timestamp <= week.end).reduce((s, i) => s + i.amount, 0);
        const monthSum = data.expenses.filter(i => i.timestamp >= month.start && i.timestamp <= month.end).reduce((s, i) => s + i.amount, 0);

        document.getElementById('weekSum').innerText = weekSum;
        document.getElementById('weekBalance').innerText = data.weekTotal - weekSum;
        document.getElementById('weekTotalLabel').innerText = data.weekTotal;

        const mStart = new Date(month.start);
        const mEnd = new Date(month.end);
        document.getElementById('monthTitle').innerText = `${mStart.getMonth()+1}/${mStart.getDate()} - ${mEnd.getMonth()+1}/${mEnd.getDate()} CYCLE`;
        document.getElementById('monthSum').innerText = monthSum;
        document.getElementById('monthBalance').innerText = data.monthTotal - monthSum;
        document.getElementById('monthTotalLabel').innerText = data.monthTotal;
        
        const progress = Math.min((monthSum / data.monthTotal) * 100, 100);
        document.getElementById('monthProgress').style.width = progress + '%';

        const list = document.getElementById('expenseList');
        list.innerHTML = data.expenses.slice(0, 10).map((item) => {
            const trueIndex = data.expenses.findIndex(i => i.id === item.id);
            return `
                <div class="bg-white p-3 rounded-2xl border border-gray-50 flex justify-between items-center text-sm shadow-sm">
                    <div><span class="font-black text-gray-800">$${item.amount}</span> <span class="text-gray-400 text-xs ml-2">${item.note}</span></div>
                    <div class="flex items-center space-x-3">
                        <span class="text-[9px] text-gray-300 font-bold">${new Date(item.timestamp).getMonth()+1}/${new Date(item.timestamp).getDate()}</span>
                        <button onclick="deleteItem(${trueIndex})" class="text-gray-300 hover:text-red-400 transition-colors">&times;</button>
                    </div>
                </div>
            `;
        }).join('');
        renderCalendar();
    }

    function deleteItem(idx) { if(confirm("刪除？")) { data.expenses.splice(idx, 1); saveAndRender(); } }
    function manualReset() { if(confirm("確定清空？")) { data.expenses = []; saveAndRender(); } }
    
    resetTimeInput();
    render();
</script>
</body>
</html>
